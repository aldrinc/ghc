<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDP UGC Standard</title>
    <link rel="stylesheet" href="./shared.css" />
    <link rel="stylesheet" href="./pdp_shared.css" />
    <style>
      #bubble-primary {
        left: 22px;
        bottom: calc(var(--strip-h) + 90px);
      }

      #bubble-secondary {
        display: none;
        left: 22px;
      }

      #card.has-dual-comments #bubble-primary {
        left: 30px;
        top: 40px;
        bottom: auto;
      }

      #card.has-dual-comments #bubble-secondary {
        left: auto;
        right: 22px;
        bottom: calc(var(--strip-h) + 200px);
      }

      #card.is-feed #bubble-primary {
        left: 16px;
        right: auto;
        bottom: calc(var(--strip-h) + 63px);
      }

      #card.is-feed #bubble-secondary {
        left: 16px;
        right: auto;
      }

      #card.is-feed.has-dual-comments #bubble-primary {
        left: 24px;
        top: 30px;
        bottom: auto;
      }

      #card.is-feed.has-dual-comments #bubble-secondary {
        left: auto;
        right: 16px;
        bottom: calc(var(--strip-h) + 175px);
      }
    </style>
  </head>
  <body>
    <div id="card">
      <img id="bg" class="pdp-bg" alt="" />
      <div class="pdp-vignette"></div>

      <div id="bubble-primary" class="pdp-bubble pdp-comment-box">
        <div class="pdp-bubble-row">
          <div id="primary-avatar" class="pdp-avatar" aria-label="Comment avatar"></div>
          <div class="pdp-bubble-copy">
            <div id="primary-context" class="pdp-bubble-header"></div>
            <div id="primary-text" class="pdp-bubble-text"></div>
          </div>
        </div>
      </div>

      <div id="bubble-secondary" class="pdp-bubble pdp-comment-box">
        <div class="pdp-bubble-row">
          <div id="secondary-avatar" class="pdp-avatar" aria-label="Comment avatar"></div>
          <div class="pdp-bubble-copy">
            <div id="secondary-context" class="pdp-bubble-header"></div>
            <div id="secondary-text" class="pdp-bubble-text"></div>
          </div>
        </div>
      </div>

      <div class="pdp-strip">
        <div class="pdp-strip-left">
          <div class="pdp-rating-row">
            <div class="pdp-stars" aria-hidden="true">
              <svg class="pdp-star" viewBox="0 0 16 16"><path d="M3.612 15.443c-.386.198-.824-.149-.746-.592l.83-4.73L.173 6.765c-.329-.314-.158-.888.283-.95l4.898-.696L7.538.792c.197-.39.73-.39.927 0l2.184 4.327 4.898.696c.441.062.612.636.282.95l-3.523 3.356.83 4.73c.078.443-.36.79-.746.592L8 13.187z"/></svg>
              <svg class="pdp-star" viewBox="0 0 16 16"><path d="M3.612 15.443c-.386.198-.824-.149-.746-.592l.83-4.73L.173 6.765c-.329-.314-.158-.888.283-.95l4.898-.696L7.538.792c.197-.39.73-.39.927 0l2.184 4.327 4.898.696c.441.062.612.636.282.95l-3.523 3.356.83 4.73c.078.443-.36.79-.746.592L8 13.187z"/></svg>
              <svg class="pdp-star" viewBox="0 0 16 16"><path d="M3.612 15.443c-.386.198-.824-.149-.746-.592l.83-4.73L.173 6.765c-.329-.314-.158-.888.283-.95l4.898-.696L7.538.792c.197-.39.73-.39.927 0l2.184 4.327 4.898.696c.441.062.612.636.282.95l-3.523 3.356.83 4.73c.078.443-.36.79-.746.592L8 13.187z"/></svg>
              <svg class="pdp-star" viewBox="0 0 16 16"><path d="M3.612 15.443c-.386.198-.824-.149-.746-.592l.83-4.73L.173 6.765c-.329-.314-.158-.888.283-.95l4.898-.696L7.538.792c.197-.39.73-.39.927 0l2.184 4.327 4.898.696c.441.062.612.636.282.95l-3.523 3.356.83 4.73c.078.443-.36.79-.746.592L8 13.187z"/></svg>
              <svg class="pdp-star" viewBox="0 0 16 16"><path d="M3.612 15.443c-.386.198-.824-.149-.746-.592l.83-4.73L.173 6.765c-.329-.314-.158-.888.283-.95l4.898-.696L7.538.792c.197-.39.73-.39.927 0l2.184 4.327 4.898.696c.441.062.612.636.282.95l-3.523 3.356.83 4.73c.078.443-.36.79-.746.592L8 13.187z"/></svg>
            </div>
            <div class="pdp-rating-text">
              <span id="rating-value"></span>
              <span id="rating-detail"></span>
            </div>
          </div>
          <div id="cta" class="pdp-cta"></div>
        </div>

        <div class="pdp-logo">
          <img id="logo-img" alt="" />
          <div id="logo-text" class="pdp-logo-text"></div>
        </div>
      </div>
    </div>

    <script>
      const waitForImage = (img) =>
        new Promise((resolve, reject) => {
          if (!img) {
            reject(new Error('Image element not found.'));
            return;
          }
          if (img.complete && img.naturalWidth > 0) {
            resolve();
            return;
          }
          img.addEventListener('load', () => resolve(), { once: true });
          img.addEventListener('error', () => reject(new Error('Failed to load image.')), { once: true });
        });

      const setLogo = (brand, waits) => {
        const img = document.getElementById('logo-img');
        const text = document.getElementById('logo-text');
        img.style.display = 'none';
        text.style.display = 'none';

        if (brand.logoUrl) {
          img.src = brand.logoUrl;
          img.alt = 'Brand logo';
          img.style.display = 'block';
          waits.push(waitForImage(img));
          return;
        }

        text.textContent = brand.logoText;
        text.style.display = 'block';
      };

      const setOutputPreset = (output) => {
        const preset = output && output.preset;
        if (!preset || preset === 'feed') {
          document.getElementById('card').classList.add('is-feed');
          return;
        }
        throw new Error(`Unsupported output.preset: ${preset}. Only "feed" is supported.`);
      };

      const fitContextLine = (el) => {
        if (!el) {
          return;
        }

        const scaledNodes = Array.from(el.querySelectorAll('.pdp-context-scaled'));
        if (scaledNodes.length === 0) {
          return;
        }

        scaledNodes.forEach((node) => {
          node.style.fontSize = '';
        });

        const computedFontSize = Number.parseFloat(window.getComputedStyle(scaledNodes[0]).fontSize);
        if (!Number.isFinite(computedFontSize) || computedFontSize <= 0) {
          return;
        }

        if (el.clientWidth <= 0) {
          return;
        }

        const fixedWidth = Array.from(el.children)
          .filter((node) => !node.classList.contains('pdp-context-scaled'))
          .reduce((total, node) => {
            const style = window.getComputedStyle(node);
            const marginLeft = Number.parseFloat(style.marginLeft) || 0;
            const marginRight = Number.parseFloat(style.marginRight) || 0;
            return total + node.getBoundingClientRect().width + marginLeft + marginRight;
          }, 0);

        const availableWidth = el.clientWidth - fixedWidth;
        if (availableWidth <= 0) {
          return;
        }

        const isFeed = document.getElementById('card').classList.contains('is-feed');
        const minFontSize = isFeed ? 4.75 : 5;
        let nextFontSize = computedFontSize;

        const measureScaledWidth = () =>
          scaledNodes.reduce((total, node) => total + node.getBoundingClientRect().width, 0);

        const applyFontSize = (fontSize) => {
          scaledNodes.forEach((node) => {
            node.style.fontSize = `${fontSize}px`;
          });
        };

        const initialScaledWidth = measureScaledWidth();
        if (initialScaledWidth > availableWidth) {
          nextFontSize = Math.max(minFontSize, (computedFontSize * availableWidth) / initialScaledWidth);
          applyFontSize(nextFontSize);
        }

        while (measureScaledWidth() > availableWidth && nextFontSize > minFontSize) {
          nextFontSize = Math.max(minFontSize, nextFontSize - 0.25);
          applyFontSize(nextFontSize);
        }
      };

      const alignAvatarToFirstTextLine = (avatarEl, textEl) => {
        if (!avatarEl || !textEl || avatarEl.style.display === 'none') {
          return;
        }

        const row = avatarEl.parentElement;
        if (!row) {
          return;
        }

        avatarEl.style.marginTop = '0px';

        const rowBox = row.getBoundingClientRect();
        const avatarBox = avatarEl.getBoundingClientRect();
        const textBox = textEl.getBoundingClientRect();
        const computedStyle = window.getComputedStyle(textEl);
        let lineHeight = Number.parseFloat(computedStyle.lineHeight);
        if (!Number.isFinite(lineHeight) || lineHeight <= 0) {
          const fontSize = Number.parseFloat(computedStyle.fontSize);
          if (!Number.isFinite(fontSize) || fontSize <= 0) {
            return;
          }
          lineHeight = fontSize * 1.2;
        }

        const desiredTop = textBox.top - rowBox.top + lineHeight / 2 - avatarBox.height / 2;
        avatarEl.style.marginTop = `${Math.max(0, desiredTop)}px`;
      };

      const resolveComments = (data) => {
        if (Array.isArray(data.comments) && data.comments.length > 0) {
          return data.comments;
        }
        if (data.comment && typeof data.comment === 'object') {
          return [data.comment];
        }
        throw new Error('pdp_ugc_standard requires comment or comments.');
      };

      const setCommentLayout = (comments) => {
        const card = document.getElementById('card');
        if (!card) {
          throw new Error('Card element not found.');
        }
        card.classList.toggle('has-dual-comments', Array.isArray(comments) && comments.length > 1);
      };

      const setContextLine = (el, handle, verified = true) => {
        el.innerHTML = '';

        const preBadgeText = document.createElement('span');
        preBadgeText.className = 'pdp-context-scaled';

        const prefix = document.createElement('span');
        prefix.className = 'pdp-context-prefix';
        prefix.textContent = 'Reply to ';

        const handleSpan = document.createElement('span');
        handleSpan.className = 'pdp-handle';
        handleSpan.textContent = handle;

        const possessive = document.createElement('span');
        possessive.className = 'pdp-context-suffix';
        possessive.textContent = "'s";

        preBadgeText.appendChild(prefix);
        preBadgeText.appendChild(handleSpan);
        preBadgeText.appendChild(possessive);

        const verifiedBadge = document.createElement('span');
        verifiedBadge.className = 'pdp-verified';
        verifiedBadge.title = 'Verified';
        verifiedBadge.setAttribute('aria-label', 'Verified');
        const verifiedBadgeImage = document.createElement('img');
        verifiedBadgeImage.src = '../assets/verified_badge_tight.png';
        verifiedBadgeImage.alt = '';
        verifiedBadgeImage.setAttribute('aria-hidden', 'true');
        verifiedBadge.appendChild(verifiedBadgeImage);

        const suffix = document.createElement('span');
        suffix.className = 'pdp-context-scaled pdp-context-suffix';
        suffix.textContent = ' comment';

        el.appendChild(preBadgeText);
        if (verified) {
          el.appendChild(verifiedBadge);
        }
        el.appendChild(suffix);
        fitContextLine(el);
        return verified ? verifiedBadgeImage : null;
      };

      const populateCommentBubble = ({ bubbleId, avatarId, contextId, textId, comment, waits }) => {
        const bubble = document.getElementById(bubbleId);
        const avatar = document.getElementById(avatarId);
        const context = document.getElementById(contextId);
        const text = document.getElementById(textId);

        if (!bubble || !avatar || !context || !text) {
          throw new Error(`Missing comment bubble elements for ${bubbleId}.`);
        }

        bubble.style.display = 'block';

        const avatarWait = setAvatar(avatar, comment);
        if (avatarWait) {
          waits.push(avatarWait);
        }

        const verifiedBadgeImage = setContextLine(context, comment.handle, comment.verified !== false);
        if (verifiedBadgeImage) {
          waits.push(waitForImage(verifiedBadgeImage));
        }
        text.textContent = comment.text;

        return { bubble, avatar, context, text };
      };

      const hideCommentBubble = ({ bubbleId, contextId, textId, avatarId }) => {
        const bubble = document.getElementById(bubbleId);
        const context = document.getElementById(contextId);
        const text = document.getElementById(textId);
        const avatar = document.getElementById(avatarId);

        if (!bubble || !context || !text || !avatar) {
          return;
        }

        bubble.style.display = 'none';
        bubble.style.top = '';
        bubble.style.right = '';
        bubble.style.left = '';
        bubble.style.bottom = '';
        context.textContent = '';
        text.textContent = '';
        avatar.textContent = '';
        avatar.style.backgroundImage = 'none';
        avatar.classList.remove('has-image');
      };

      const initialsFromHandle = (handle) => {
        const cleaned = String(handle || '').replace(/^@+/, '').trim();
        if (!cleaned) return 'U';
        const tokens = cleaned
          .split(/[\s._-]+/)
          .map((token) => token.trim())
          .filter(Boolean);
        if (tokens.length >= 2) {
          return `${tokens[0][0]}${tokens[1][0]}`.toUpperCase();
        }
        return cleaned.slice(0, 2).toUpperCase();
      };

      const waitForBackgroundImage = (url) =>
        new Promise((resolve, reject) => {
          const img = new Image();
          img.addEventListener('load', () => resolve(), { once: true });
          img.addEventListener('error', () => reject(new Error('Failed to load avatar image.')), {
            once: true,
          });
          img.src = url;
        });

      const setAvatar = (el, comment) => {
        const avatarUrl = typeof comment.avatarUrl === 'string' ? comment.avatarUrl.trim() : '';
        if (avatarUrl) {
          el.classList.add('has-image');
          el.style.backgroundImage = `url("${avatarUrl.replace(/"/g, '\\"')}")`;
          el.textContent = '';
          return waitForBackgroundImage(avatarUrl);
        }
        el.classList.remove('has-image');
        el.style.backgroundImage = 'none';
        el.textContent = initialsFromHandle(comment.handle);
        return null;
      };

      const setCtaText = (el, text) => {
        const raw = typeof text === 'string' ? text.trim() : '';
        el.replaceChildren();

        if (!raw) {
          return;
        }

        const match = raw.match(/^(.*?)(\s*FREE TODAY!?)$/i);
        if (!match || !match[1].trim()) {
          el.textContent = raw;
          return;
        }

        const strong = document.createElement('span');
        strong.className = 'pdp-cta-strong';
        strong.textContent = match[1].trimEnd();
        el.appendChild(strong);
        el.appendChild(document.createTextNode(' '));

        const soft = document.createElement('span');
        soft.className = 'pdp-cta-soft';
        soft.textContent = match[2].trimStart();
        el.appendChild(soft);
      };

      window.setCardData = async (data) => {
        if (!data || typeof data !== 'object') {
          throw new Error('Payload must be an object.');
        }

        setOutputPreset(data.output);

        const card = document.getElementById('card');
        card.style.setProperty('--strip-bg', data.brand.stripBgColor);
        card.style.setProperty('--strip-text', data.brand.stripTextColor);
        card.style.setProperty('--pdp-comment-tail-scale', String(data.output.commentTailScale));

        const waits = [];

        const bg = document.getElementById('bg');
        bg.src = data.background.imageUrl;
        bg.alt = data.background.alt || '';
        waits.push(waitForImage(bg));

        const comments = resolveComments(data);
        setCommentLayout(comments);
        const primaryBubble = populateCommentBubble({
          bubbleId: 'bubble-primary',
          avatarId: 'primary-avatar',
          contextId: 'primary-context',
          textId: 'primary-text',
          comment: comments[0],
          waits,
        });

        let secondaryBubble = null;
        if (comments[1]) {
          secondaryBubble = populateCommentBubble({
            bubbleId: 'bubble-secondary',
            avatarId: 'secondary-avatar',
            contextId: 'secondary-context',
            textId: 'secondary-text',
            comment: comments[1],
            waits,
          });
        } else {
          hideCommentBubble({
            bubbleId: 'bubble-secondary',
            avatarId: 'secondary-avatar',
            contextId: 'secondary-context',
            textId: 'secondary-text',
          });
        }

        document.getElementById('rating-value').textContent = data.rating.valueText;
        document.getElementById('rating-detail').textContent = ` ${data.rating.detailText}`;
        setCtaText(document.getElementById('cta'), data.cta.text);

        setLogo(data.brand, waits);

        await Promise.all(waits);
        await document.fonts.ready;
        await new Promise((resolve) => window.requestAnimationFrame(resolve));

        fitContextLine(primaryBubble.context);
        alignAvatarToFirstTextLine(primaryBubble.avatar, primaryBubble.text);

        if (secondaryBubble) {
          fitContextLine(secondaryBubble.context);
          alignAvatarToFirstTextLine(secondaryBubble.avatar, secondaryBubble.text);
        }
      };
    </script>
  </body>
</html>
