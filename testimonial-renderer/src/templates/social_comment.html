<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comment Bubble Template</title>
    <style>
      :root {
        --bubble-bg: #ffffff;
        --text-main: #000000;
        --text-light: #666666;
        --avatar-placeholder: #eeeeee;
        --badge-teal: #00c8f5;
        --placeholder-border: #cccccc;
        --card-bg: #111111;
        --meta-text: rgba(255, 255, 255, 0.72);
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          sans-serif;
        margin: 0;
        background: transparent;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 0;
      }

      #card {
        display: inline-flex;
        flex-direction: column;
        gap: 28px;
        min-width: 720px;
        max-width: 1120px;
        padding: 72px;
        background: var(--card-bg);
        color: white;
        box-sizing: border-box;
      }

      #section-header {
        display: none;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        color: rgba(255, 255, 255, 0.92);
      }

      #section-header.is-visible {
        display: flex;
      }

      .section-title {
        font-size: 28px;
        line-height: 1.1;
        font-weight: 700;
      }

      .section-sort {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: rgba(255, 255, 255, 0.78);
        font-size: 18px;
      }

      .section-sort svg {
        width: 20px;
        height: 20px;
      }

      #comment-section {
        display: flex;
        flex-direction: column;
        gap: 28px;
        align-items: flex-start;
      }

      .thread-block {
        display: flex;
        flex-direction: column;
        gap: 14px;
        width: 100%;
      }

      .thread-block.reply {
        margin-left: 84px;
      }

      .reply-stack {
        display: flex;
        flex-direction: column;
        gap: 18px;
        margin-top: 4px;
      }

      .bubble-frame {
        display: inline-block;
        position: relative;
        padding-left: 20px;
        max-width: 100%;
      }

      .bubble {
        display: grid;
        grid-template-areas:
          "avatar header"
          "avatar body"
          "avatar attachment";
        grid-template-columns: min-content minmax(0, 1fr);
        grid-template-rows: auto auto auto;
        gap: 16px 20px;
        background-color: var(--bubble-bg);
        border-radius: 20px 20px 20px 0;
        padding: 24px 32px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        max-width: min(860px, calc(100vw - 220px));
        color: var(--text-main);
        box-sizing: border-box;
      }

      .thread-block.reply .bubble {
        gap: 12px 16px;
        padding: 20px 24px;
        max-width: min(700px, calc(100vw - 260px));
      }

      .avatar {
        grid-area: avatar;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background-color: var(--avatar-placeholder);
        align-self: start;
        border: 1px solid var(--placeholder-border);
        object-fit: cover;
      }

      .thread-block.reply .avatar {
        width: 44px;
        height: 44px;
      }

      .comment-head {
        grid-area: header;
        color: var(--text-light);
        font-size: 20px;
        font-weight: 400;
        line-height: 1.2;
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        min-width: 0;
      }

      .thread-block.reply .comment-head {
        font-size: 16px;
      }

      .reply-to,
      .comment-suffix {
        white-space: nowrap;
      }

      .comment-name {
        display: inline-block;
        margin: 0 6px;
        color: var(--text-light);
        font-weight: 500;
        white-space: nowrap;
        max-width: 280px;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .thread-block.reply .comment-name {
        max-width: 220px;
      }

      .verification-badge {
        display: inline-flex;
        align-items: center;
        margin: 0 4px;
        flex-shrink: 0;
      }

      .verification-badge svg {
        width: 24px;
        height: 24px;
      }

      .thread-block.reply .verification-badge svg {
        width: 20px;
        height: 20px;
      }

      .comment-body {
        grid-area: body;
        color: var(--text-main);
        font-size: 40px;
        font-weight: 800;
        line-height: 1.04;
        letter-spacing: -0.03em;
        overflow-wrap: anywhere;
      }

      .thread-block.reply .comment-body {
        font-size: 28px;
      }

      .comment-attachment {
        grid-area: attachment;
        max-width: 420px;
        overflow: hidden;
        border-radius: 14px;
      }

      .comment-attachment img {
        display: block;
        width: 100%;
        height: auto;
        object-fit: cover;
      }

      .bubble-tail {
        position: absolute;
        left: 0;
        bottom: 0;
        width: 0;
        height: 0;
        border-right: 20px solid var(--bubble-bg);
        border-top: 20px solid transparent;
        border-bottom: 20px solid transparent;
        z-index: 1;
        transform: translateY(-0.1px);
      }

      .comment-meta {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px 16px;
        padding-left: 40px;
        color: var(--meta-text);
        font-size: 18px;
        line-height: 1.2;
      }

      .thread-block.reply .comment-meta {
        padding-left: 28px;
        font-size: 16px;
      }

      .comment-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .comment-chip.action {
        font-weight: 600;
      }

      .comment-chip.reaction {
        color: white;
      }

      .comment-chip.reaction svg {
        width: 18px;
        height: 18px;
      }

      .view-replies {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-left: 40px;
        color: rgba(255, 255, 255, 0.86);
        font-size: 17px;
        font-weight: 600;
      }

      .view-replies::before {
        content: "";
        width: 26px;
        height: 1px;
        background: rgba(255, 255, 255, 0.36);
      }

      .thread-block.reply + .view-replies {
        margin-top: -6px;
      }
    </style>
  </head>
  <body>
    <div id="card">
      <div id="section-header">
        <div id="section-title" class="section-title"></div>
        <div id="section-sort" class="section-sort">
          <span>Sort</span>
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M7 10L12 15L17 10"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
      </div>
      <div id="comment-section"></div>
    </div>

    <script>
      const waitForImage = (img) =>
        new Promise((resolve, reject) => {
          if (!img) {
            reject(new Error("Image element not found."));
            return;
          }
          if (img.complete && img.naturalWidth > 0) {
            resolve();
            return;
          }
          img.addEventListener("load", () => resolve(), { once: true });
          img.addEventListener(
            "error",
            () => {
              const src = String(img.currentSrc || img.src || "");
              let summary = src;
              if (src.startsWith("data:")) {
                const comma = src.indexOf(",");
                const header = comma >= 0 ? src.slice(0, comma) : src.slice(0, 80);
                summary = `${header},... (len=${src.length})`;
              } else if (src.length > 200) {
                summary = `${src.slice(0, 200)}...`;
              }
              reject(new Error("Failed to load image (src=" + summary + ")."));
            },
            { once: true }
          );
        });

      const createEl = (tag, className, text) => {
        const el = document.createElement(tag);
        if (className) {
          el.className = className;
        }
        if (text != null) {
          el.textContent = text;
        }
        return el;
      };

      const buildVerifiedBadge = () => {
        const badge = createEl("span", "verification-badge");
        badge.innerHTML =
          '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true">' +
          '<circle cx="12" cy="12" r="10" fill="#00c8f5"></circle>' +
          '<path d="M10 16L6 12L7.41 10.59L10 13.17L16.59 6.58L18 8L10 16Z" fill="white"></path>' +
          "</svg>";
        return badge;
      };

      const buildAvatar = (comment, imageList) => {
        const avatar = document.createElement("img");
        avatar.className = "avatar";
        avatar.alt = `${comment.name} avatar`;
        avatar.src = comment.avatarUrl;
        imageList.push(avatar);
        return avatar;
      };

      const buildHeader = (comment) => {
        const head = createEl("div", "comment-head");
        head.appendChild(createEl("span", "reply-to", "Reply to"));
        head.appendChild(createEl("span", "comment-name", comment.name));
        head.appendChild(buildVerifiedBadge());
        head.appendChild(createEl("span", "comment-suffix", "'s comment"));
        return head;
      };

      const buildAttachment = (attachmentUrl, imageList) => {
        const wrapper = createEl("div", "comment-attachment");
        const img = document.createElement("img");
        img.alt = "Comment attachment";
        img.src = attachmentUrl;
        wrapper.appendChild(img);
        imageList.push(img);
        return wrapper;
      };

      const buildReactionChip = (count) => {
        const chip = createEl("span", "comment-chip reaction");
        chip.innerHTML =
          '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true">' +
          '<circle cx="12" cy="12" r="11" fill="#00c8f5"></circle>' +
          '<path d="M8.2 12.9 10.5 15.1 15.9 9.7" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path>' +
          "</svg>";
        chip.appendChild(createEl("span", "", String(count)));
        return chip;
      };

      const buildMetaRow = (comment) => {
        const row = createEl("div", "comment-meta");
        let hasContent = false;

        if (comment.meta && comment.meta.time) {
          row.appendChild(createEl("span", "comment-chip", comment.meta.time));
          hasContent = true;
        }

        if (comment.meta && comment.meta.followLabel) {
          row.appendChild(createEl("span", "comment-chip action", comment.meta.followLabel));
          hasContent = true;
        }

        if (comment.meta && comment.meta.authorLabel) {
          row.appendChild(createEl("span", "comment-chip action", comment.meta.authorLabel));
          hasContent = true;
        }

        if (typeof comment.reactionCount === "number" && comment.reactionCount > 0) {
          row.appendChild(buildReactionChip(comment.reactionCount));
          hasContent = true;
        }

        return hasContent ? row : null;
      };

      const buildBubble = (comment, imageList) => {
        const frame = createEl("div", "bubble-frame");
        const bubble = createEl("div", "bubble");
        bubble.appendChild(buildAvatar(comment, imageList));
        bubble.appendChild(buildHeader(comment));
        bubble.appendChild(createEl("div", "comment-body", comment.text));

        if (comment.attachmentUrl) {
          bubble.appendChild(buildAttachment(comment.attachmentUrl, imageList));
        }

        frame.appendChild(bubble);
        frame.appendChild(createEl("div", "bubble-tail"));
        return frame;
      };

      const buildCommentBlock = (comment, options) => {
        const { imageList, isReply } = options;
        const block = createEl("div", `thread-block${isReply ? " reply" : ""}`);
        block.appendChild(buildBubble(comment, imageList));

        const metaRow = buildMetaRow(comment);
        if (metaRow) {
          block.appendChild(metaRow);
        }

        return block;
      };

      const buildReplies = (comment, imageList) => {
        const wrapper = createEl("div", "reply-stack");

        comment.replies.forEach((reply) => {
          wrapper.appendChild(buildCommentBlock(reply, { imageList, isReply: true }));
        });

        if (comment.viewRepliesText) {
          wrapper.appendChild(createEl("div", "view-replies", comment.viewRepliesText));
        }

        return wrapper;
      };

      const renderHeader = (header) => {
        const headerEl = document.getElementById("section-header");
        const titleEl = document.getElementById("section-title");
        const sortEl = document.getElementById("section-sort");

        titleEl.textContent = header.title || "";
        sortEl.style.display = header.showSortIcon ? "inline-flex" : "none";

        if (header.title || header.showSortIcon) {
          headerEl.classList.add("is-visible");
        } else {
          headerEl.classList.remove("is-visible");
        }
      };

      window.setCardData = async (data) => {
        if (!data || typeof data !== "object") {
          throw new Error("Payload must be an object.");
        }

        const header = data.header;
        if (!header || typeof header !== "object") {
          throw new Error("header is required.");
        }

        if (!Array.isArray(data.comments) || data.comments.length === 0) {
          throw new Error("comments must be a non-empty array.");
        }

        renderHeader(header);

        const section = document.getElementById("comment-section");
        section.replaceChildren();

        const fragment = document.createDocumentFragment();
        const imageList = [];

        data.comments.forEach((comment) => {
          fragment.appendChild(buildCommentBlock(comment, { imageList, isReply: false }));

          if (Array.isArray(comment.replies) && comment.replies.length > 0) {
            fragment.appendChild(buildReplies(comment, imageList));
          }
        });

        section.appendChild(fragment);
        await Promise.all(imageList.map(waitForImage));
      };
    </script>
  </body>
</html>
