# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "38e928aaa25e54c8ee25c2db99547094"
name = "mOS-prod"
application_url = "https://app.moshq.app/"
embedded = true

[build]
automatically_update_urls_on_dev = false

[webhooks]
api_version = "2026-04"

[[webhooks.subscriptions]]
compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
uri = "/webhooks/compliance"

[access_scopes]
# Keep this aligned with SHOPIFY_APP_SCOPES in shopify-funnel-app/.env
scopes = "read_products,write_products,read_orders,read_content,write_content,read_inventory,write_inventory,read_themes,unauthenticated_read_product_listings"

[auth]
redirect_urls = [ "https://app.moshq.app/auth/callback" ]
